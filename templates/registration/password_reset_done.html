{% extends 'core/base.html' %}

{% block title %}Reset Email Sent - MedSaaS{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="msaas-form-card text-center">
                <span class="msaas-logo-mark">M+</span>
                <h3 class="mt-3 mb-2">Check your email</h3>
                <p class="text-muted">
                    If an account exists with that email address, you will receive
                    instructions for resetting your password shortly.
                </p>
                <a href="{% url 'login' %}" class="btn btn-msaas-primary mt-2">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
