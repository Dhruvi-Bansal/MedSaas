{% extends 'core/base.html' %}

{% block title %}Reset Password - MedSaaS{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="msaas-form-card">
                <div class="text-center mb-4">
                    <span class="msaas-logo-mark">M+</span>
                    <h3 class="mt-3 mb-1">Reset your password</h3>
                    <p class="text-muted">Enter your email address and we'll send you instructions.</p>
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="email" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-msaas-primary w-100">Send Reset Link</button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
